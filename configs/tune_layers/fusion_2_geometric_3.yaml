# DinoMHC Test Configuration (10% Dataset)
# =====================================================
# This config uses the 10% stratified sample for quick testing
# Created from: datasets/el/EL_Train.csv (892,539 samples)
# Distribution maintained: 138 MHC alleles, 7.29% positive ratio

# Data Configuration
data:
  data_dir: datasets/el/MAYBE_FINAL_DATA_23DEC
  num_workers: 64
  use_flanks: true
  flank_length: 5
  flank_mask_prob: 0.2  # Randomly mask 20% of samples' flanks during training
  max_peptide_length: 15
  max_mhc_length: 300
  test_files: # Test after each epoch
    - '/home/bala/digermhc/datasets/el/Experimental_Data - Original_Data.csv'

# Model Configuration
model:
  encoder_type: esm2  # embedding, esm2, esm2_shared
  dim: 128
  num_groove_tokens: 60
  num_fusion_layers: 2
  num_geometry_blocks: 3
  num_heads: 4
  dropout: 0.1
  task_head: 'presentation'
  flank_pooling: 'mean'

# ESM-2 Encoder Configuration (only used if encoder_type is esm2 or esm2_shared)
esm:
  model_name: facebook/esm2_t30_150M_UR50D
  unfreeze_layers: 6
  unfreeze_embeddings: false
  # Quantization: null, '4bit', or '8bit' (requires bitsandbytes)
  quantization: null
  # LoRA configuration (requires peft)
  use_lora: false
  lora_r: 8           # LoRA rank
  lora_alpha: 16      # LoRA alpha scaling factor
  lora_dropout: 0.1   # LoRA dropout
  lora_target_modules: ['query', 'key', 'value']  # null = default ['query', 'key', 'value']

# Training Configuration
training:
  batch_size: 58
  learning_rate: 0.001
  weight_decay: 0.0006
  encoder_lr_factor: 0.1
  warmup_steps: 1500
  max_epochs: 20
  max_steps: -1  # -1 for no limit
  accumulate_grad_batches: 9
  gradient_clip_val: 1.0
  precision: "bf16-mixed"  # 32, 16-mixed, bf16-mixed

# Loss Configuration
loss:
  # Allele-Balanced Focal Loss handles both class and allele imbalance
  use_allele_balanced_loss: true

  # Focal loss parameters (for class imbalance: negative vs positive)
  focal_alpha: 0.45  # Weight for positive class
  focal_gamma: 2.0   # Focusing parameter (higher = more focus on hard examples)

  # Allele balancing parameters (for allele imbalance)
  allele_weight_type: inverse_freq  # 'inverse_freq' or 'effective_num'
  allele_beta: 0.9999  # Only used if allele_weight_type='effective_num'
  normalize_allele_weights: true  # Normalize weights to mean=1
  
  # Standard BCE options (only used if use_allele_balanced_loss is false)
  pos_weight: null  # null or float
  label_smoothing: 0.0

# Callbacks Configuration
callbacks:
  patience: 3
  save_top_k: 3

# Hardware Configuration
hardware:
  gpus: 8
  strategy: 'deepspeed_stage_2'

# Logging Configuration
logging:
  experiment_name: dinomhc_fusion_2_geometric_3
  output_dir: /data/balalab/dinomhc/tune_num_layers_use_lora_unshared_encoder_freeze_MHC_branch/dinomhc_fusion_2_geometric_3
  use_wandb: false
  wandb_project: dinomhc_fusion_2_geometric_3
  wandb_entity: null

# Miscellaneous
misc:
  seed: 42
  debug: false